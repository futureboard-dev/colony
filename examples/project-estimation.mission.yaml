name: project-estimation
# Leave input vague — the analyst will ask clarifying questions before proceeding.
input: "i need a estimate for a project,"
max_cycles: 3

# params: Optional per-client overrides injected into every agent as "## Client Config".
# The estimator reads daily_rates, markup_percent, currency, and ai_tooling_per_engineer_per_day.
#
# params:
#   daily_rates:
#     senior: 1200        # override default $800/day
#     mid: 800
#     junior: 500
#     qa: 600
#     devops: 900
#   markup_percent: 30    # charge = cost × 1.30 — what you bill the client
#   currency: "USD"       # symbol shown in all cost tables
#   ai_tooling_per_engineer_per_day: 50

# LLM config: set in .colony/config.json.
# Currently configured for DeepSeek V4 Pro via Crush:
#   {
#     "llm": { "provider": "deepseek", "model": "deepseek-reasoner", "api_key_env": "DEEPSEEK_API_KEY" }
#   }

agents:
  - id: analyst
    role: business-analyst
    interactive: true   # will ask user for clarification when input is vague
  - id: estimator
    role: estimator
  - id: planner
    role: project-manager
  - id: reviewer
    role: project-manager

flow:
  # analyst extracts requirements (may ask user questions first)
  - from: __input__
    to: analyst

  # estimator breaks down effort and cost
  - from: analyst
    to: estimator

  # planner builds timeline and milestone plan
  - from: estimator
    to: planner

  # reviewer approves or sends back to estimator for revision
  - from: planner
    to: reviewer
  - from: reviewer
    on_approve: __output__
    on_reject: estimator
